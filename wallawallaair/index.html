<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex, nofollow" />
<title>Walla Walla Air — Site Unavailable</title>
<meta name="theme-color" content="#2b5672" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f6f7fb;
    --paper: #ffffff;
    --ink: #0f172a;
    --ink-soft: #475569;
    --mute: #64748b;
    --line: #e2e8f0;
    --blue: #2b5672;
    --blue-deep: #1a3e57;
    --blue-soft: #dde7f0;
    --red: #E20F25;
    --red-deep: #a80b1c;
    --red-soft: #fde7e9;
    --shadow: 0 8px 28px rgba(15, 23, 42, 0.08);
    --shadow-lg: 0 20px 50px rgba(15, 23, 42, 0.12);
    --ff-display: 'Outfit', 'Inter', system-ui, sans-serif;
    --ff-body: 'Inter', system-ui, sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { min-height: 100vh; }
  body {
    font-family: var(--ff-body);
    background: var(--bg);
    color: var(--ink);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    background-image:
      radial-gradient(ellipse 70% 40% at 80% 0%, rgba(43, 86, 114, 0.08), transparent 60%),
      radial-gradient(ellipse 50% 30% at 10% 20%, rgba(226, 15, 37, 0.05), transparent 60%);
    display: flex;
    flex-direction: column;
  }

  .emergency-strip {
    background: var(--red);
    color: #fff;
    font-size: 0.88rem;
    font-weight: 600;
    padding: 0.55rem 1rem;
    text-align: center;
    letter-spacing: 0.01em;
  }
  .emergency-strip .dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #fff;
    box-shadow: 0 0 0 3px rgba(255,255,255,0.35);
    margin-right: 0.5rem;
    vertical-align: middle;
    animation: livepulse 2s ease-in-out infinite;
  }
  @keyframes livepulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

  main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 48px 24px;
  }

  .card {
    width: 100%;
    max-width: 620px;
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 48px 40px;
    text-align: center;
    box-shadow: var(--shadow-lg);
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, var(--blue) 0%, var(--blue) 60%, var(--red) 60%, var(--red) 100%);
  }

  .logo {
    max-width: 280px;
    height: auto;
    margin: 0 auto 28px;
  }

  .eyebrow {
    display: inline-block;
    font-family: var(--ff-body);
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--red);
    background: var(--red-soft);
    padding: 6px 12px;
    border-radius: 999px;
    margin-bottom: 18px;
  }

  h1 {
    font-family: var(--ff-display);
    font-size: clamp(1.6rem, 4vw, 2rem);
    font-weight: 700;
    color: var(--blue-deep);
    letter-spacing: -0.02em;
    line-height: 1.2;
    margin-bottom: 14px;
  }

  p {
    color: var(--ink-soft);
    font-size: 1.02rem;
    margin-bottom: 10px;
    max-width: 480px;
    margin-left: auto;
    margin-right: auto;
  }

  .cta-row {
    margin-top: 28px;
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    justify-content: center;
  }

  .cta {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    font-family: var(--ff-body);
    font-weight: 600;
    font-size: 0.98rem;
    padding: 14px 26px;
    border-radius: 10px;
    text-decoration: none;
    transition: transform 0.12s ease, box-shadow 0.12s ease, background 0.12s ease;
    white-space: nowrap;
  }
  .cta-primary {
    background: var(--blue);
    color: #fff;
    box-shadow: 0 4px 14px rgba(43, 86, 114, 0.3);
  }
  .cta-primary:hover {
    background: var(--blue-deep);
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(43, 86, 114, 0.4);
  }
  .cta-secondary {
    background: var(--paper);
    color: var(--blue);
    border: 1.5px solid var(--blue-soft);
  }
  .cta-secondary:hover {
    background: var(--blue-soft);
    border-color: var(--blue);
  }

  .foot {
    margin-top: 32px;
    padding-top: 22px;
    border-top: 1px solid var(--line);
    font-size: 0.82rem;
    color: var(--mute);
  }
  .foot a {
    color: var(--blue);
    font-weight: 600;
    text-decoration: none;
  }
  .foot a:hover { text-decoration: underline; }

  @media (max-width: 520px) {
    .card { padding: 36px 24px; }
    .cta { width: 100%; }
  }
</style>
</head>
<body>

<div class="emergency-strip">
  <span class="dot"></span>THIS SITE IS CURRENTLY OFFLINE
</div>

<main>
  <div class="card">
    <img class="logo" src="https://static.wixstatic.com/media/43a56e_7ab604a7f354406ebf4c4178f1f00647~mv2.png/v1/fill/w_600,h_96,al_c,q_85/43a56e_7ab604a7f354406ebf4c4178f1f00647~mv2.png" alt="Walla Walla Air" />
    <span class="eyebrow">Site Unavailable</span>
    <h1>This website is down.</h1>
    <p>If you'd like to purchase this website to increase your conversions, please reach out — we'd love to get it back in front of customers.</p>

    <div class="cta-row">
      <a class="cta cta-primary" href="mailto:jack@blackboxadvancements.com?subject=Walla%20Walla%20Air%20website%20inquiry">Email Jack</a>
      <a class="cta cta-secondary" href="https://blackboxadvancements.com">Visit Blackbox</a>
    </div>

    <div class="foot">
      <a href="mailto:jack@blackboxadvancements.com">jack@blackboxadvancements.com</a><br>
      Powered by <a href="https://blackboxadvancements.com">Blackbox Advancements</a>
    </div>
  </div>
</main>

</body>
</html>
