<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex, nofollow" />
<title>Site Unavailable</title>
<style>
  :root {
    --bg: #0f1115;
    --panel: #161a22;
    --text: #e9ecf1;
    --muted: #9aa3b2;
    --accent: #4aa8ff;
    --border: #252a35;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    line-height: 1.5;
  }
  .card {
    width: 100%;
    max-width: 560px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 40px 32px;
    text-align: center;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
  }
  h1 {
    margin: 0 0 12px;
    font-size: 1.6rem;
    letter-spacing: -0.01em;
  }
  p {
    margin: 0 0 18px;
    color: var(--muted);
  }
  .cta {
    display: inline-block;
    margin-top: 8px;
    padding: 12px 22px;
    background: var(--accent);
    color: #0b1220;
    font-weight: 600;
    text-decoration: none;
    border-radius: 8px;
    transition: transform 0.1s ease, opacity 0.1s ease;
  }
  .cta:hover { opacity: 0.9; transform: translateY(-1px); }
  .foot {
    margin-top: 28px;
    font-size: 0.85rem;
    color: var(--muted);
  }
  .foot a { color: var(--accent); text-decoration: none; }
</style>
</head>
<body>
  <main class="card">
    <h1>This site is down.</h1>
    <p>If you'd like to purchase this website to increase your conversions, please reach out.</p>
    <a class="cta" href="mailto:jack@blackboxadvancements.com?subject=Walla%20Walla%20Air%20website%20inquiry">jack@blackboxadvancements.com</a>
    <div class="foot">Powered by <a href="https://blackboxadvancements.com">Blackbox Advancements</a></div>
  </main>
</body>
</html>
